name: NuGet Package CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: 'src/AutoRepo/AutoRepo.csproj'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

  version-and-release:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install versionize
      run: dotnet tool install --global Versionize

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run versionize
      id: versionize
      run: |
        if versionize --dry-run --skip-dirty; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          versionize --skip-dirty
          NEW_VERSION=$(git describe --tags --abbrev=0)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${NEW_VERSION#v}" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "No version changes detected"
        fi

    - name: Push changes and tags
      if: steps.versionize.outputs.has_changes == 'true'
      run: git push --follow-tags origin main

    - name: Pack
      if: steps.versionize.outputs.has_changes == 'true'
      run: dotnet pack ${{ env.PROJECT_PATH }} --configuration Release --output ./nupkg

    - name: Publish to NuGet.org
      if: steps.versionize.outputs.has_changes == 'true'
      run: |
        dotnet nuget push ./nupkg/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Create GitHub Release
      if: steps.versionize.outputs.has_changes == 'true'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.versionize.outputs.new_version }}
        release_name: Release ${{ steps.versionize.outputs.new_version }}
        draft: false
        prerelease: false
